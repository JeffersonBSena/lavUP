{% extends 'base.html' %}

{% block title %}Usuários - {{ APP_NAME }}{% endblock %}

{% block content %}

<div id="usuarios" class="mb-5">
  <h2 class="mb-4"><i class="bi bi-person-badge me-2"></i>Usuários</h2>
  <div class="mb-3">
    <button class="btn btn-primary btn-sm">Inserir</button>
  </div>
  <ul class="list-group">
    {% for usuario in usuarios %}
    <li class="list-group-item d-flex justify-content-between align-items-center">
      {{ usuario.nome }} - {{ usuario.email }}
      <span>
        <button class="btn btn-warning btn-sm" data-id="{{ usuario.id }}">Editar</button>
        <button class="btn btn-danger btn-sm" data-id="{{ usuario.id }}">Deletar</button>
      </span>
    </li>
    {% empty %}
    <li class="list-group-item text-muted">Nenhum usuário cadastrado.</li>
    {% endfor %}
  </ul>
</div>

{% endblock %}
