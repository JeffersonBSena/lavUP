{% extends 'base.html' %}

{% block title %}Clientes - {{ APP_NAME }}{% endblock %}

{% block content %}

<div id="clientes" class="mb-5">
  <h2 class="mb-4"><i class="bi bi-people me-2"></i>Clientes</h2>
  <div class="mb-3">
    <button class="btn btn-primary btn-sm">Inserir</button>
  </div>
  <div class="row g-3">
    {% for cliente in clientes %}
    <div class="col-md-4">
      <div class="card shadow-sm">
        <div class="card-body">
          <h5>{{ cliente.nome }}</h5>
          <p>Email: {{ cliente.email }}</p>
          <p>Telefone: {{ cliente.telefone }}</p>
          <button class="btn btn-warning btn-sm" data-id="{{ cliente.id }}">Editar</button>
          <button class="btn btn-danger btn-sm" data-id="{{ cliente.id }}">Deletar</button>
        </div>
      </div>
    </div>
    {% empty %}
    <p class="text-muted">Nenhum cliente cadastrado.</p>
    {% endfor %}
  </div>
</div>

{% endblock %}
