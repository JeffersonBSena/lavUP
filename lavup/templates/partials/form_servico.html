<div class="modal fade" id="modalServico" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">

            <form id="formServico" method="post" action="{% url 'servico_criar' %}">
                {% csrf_token%}

                <div class="modal-header">
                    <h5 class="modal-title" id="modalServicoLabel">Novo Serviço</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>

                <div class="modal-body">

                    <div class="mb-3">
                        <label class="form-label">Nome</label>
                        <input type="text" class="form-control" name="nome" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Descrição</label>
                        <textarea type="text" class="form-control" name="descricao" rows="3"></textarea>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Valor Base (R$)</label>
                        <input type="number" step="0.01" class="form-control" name="valor_base" placeholder="0.00" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Incremento de tempo (minutos)</label>
                        <input type="number" class="form-control" name="incremento_tempo" placeholder="Ex: 30" required>
                    </div>

                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" name="ativo" id="ativo" checked>
                        <label class="form-check-label" for="ativo">Ativo</label>
                    </div>
                </div>

                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>

                    <button type="button" class="btn btn-primary">Salvar</button>
                </div>
            </form>
        </div>
    </div>
</div>
